{% extends "layout.html" %}
{% block title %}内容风云榜 - EmbyPulse{% endblock %}
{% block head %}
<style>
    /* 领奖台呼吸特效 */
    .podium-card { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .podium-card:hover { transform: translateY(-8px); z-index: 30; }
    
    .rank-1-border { border: 2px solid rgba(245, 158, 11, 0.8); box-shadow: 0 15px 35px -10px rgba(245, 158, 11, 0.4); }
    .rank-2-border { border: 2px solid rgba(203, 213, 225, 0.8); box-shadow: 0 15px 35px -10px rgba(203, 213, 225, 0.3); }
    .rank-3-border { border: 2px solid rgba(180, 83, 9, 0.8); box-shadow: 0 15px 35px -10px rgba(180, 83, 9, 0.3); }

    .crown-icon { 
        position: absolute; top: -20px; left: 50%; transform: translateX(-50%); 
        font-size: 1.8rem; color: #f59e0b; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3)); 
        z-index: 20; 
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto w-full px-4 md:px-8 py-6 pb-24">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <div class="text-center md:text-left">
            <h1 class="text-2xl md:text-3xl font-black text-gray-900 dark:text-white flex items-center gap-3 justify-center md:justify-start tracking-tight">
                <i class="fa-solid fa-trophy text-amber-500"></i> 年度风云榜
            </h1>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1 font-medium">全服播放热度与时长综合排行</p>
        </div>
        
        <div class="flex flex-wrap justify-center items-center gap-2 bg-white dark:bg-gray-800 p-1.5 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
            <div class="flex">
                <button onclick="setCategory('all')" class="cat-btn px-4 py-1.5 rounded-lg text-xs font-bold transition bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white" data-cat="all">全局</button>
                <button onclick="setCategory('Movie')" class="cat-btn px-4 py-1.5 rounded-lg text-xs font-bold transition text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-600" data-cat="Movie">电影</button>
                <button onclick="setCategory('Episode')" class="cat-btn px-4 py-1.5 rounded-lg text-xs font-bold transition text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-600" data-cat="Episode">剧集</button>
            </div>
            <div class="h-5 w-px bg-gray-200 dark:bg-gray-700 mx-1"></div>
            <select id="user-select" onchange="changeUser()" class="bg-transparent text-xs font-bold text-gray-600 dark:text-gray-300 focus:outline-none cursor-pointer max-w-[120px] truncate px-2">
                <option value="all">🌏 统计全服</option>
            </select>
        </div>
    </div>

    <div id="loading" class="text-center py-32 text-gray-400">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3"></i>
        <p class="text-sm font-bold tracking-widest animate-pulse">正在生成影视战报...</p>
    </div>

    <div id="content-area" class="hidden animate-fade-in space-y-12">
        
        <div class="flex flex-row items-end justify-center gap-3 md:gap-8 px-2" id="podium-section"></div>

        <div class="max-w-5xl mx-auto w-full">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-bold text-gray-700 dark:text-gray-300 text-sm tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-gray-400"></i> 极客入围名单
                </h3>
                <span class="text-[10px] md:text-xs font-mono font-bold text-gray-500 bg-gray-200/50 dark:bg-gray-800 px-2.5 py-1 rounded-md">Top 4 - 50</span>
            </div>
            
            <div id="list-section" class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let state = { user: 'all', category: 'all', sortBy: 'count', period: 'all' };
    let maxPlayCount = 1;

    async function init() {
        await loadUsers();
        loadContent();
    }

    function setCategory(cat) {
        state.category = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            if(btn.dataset.cat === cat) {
                btn.className = "cat-btn px-4 py-1.5 rounded-lg text-xs font-bold transition bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white";
            } else {
                btn.className = "cat-btn px-4 py-1.5 rounded-lg text-xs font-bold transition text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-600";
            }
        });
        loadContent();
    }

    async function loadUsers() {
        try {
            const res = await fetch('/api/users');
            const json = await res.json();
            const select = document.getElementById('user-select');
            if(json.status === 'success') {
                json.data.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.UserId;
                    option.innerText = `👤 ${user.UserName}`;
                    select.appendChild(option);
                });
            }
        } catch (e) { console.error("用户加载失败", e); }
    }

    function changeUser() {
        state.user = document.getElementById('user-select').value;
        loadContent();
    }

    async function loadContent() {
        const loading = document.getElementById('loading');
        const content = document.getElementById('content-area');
        loading.classList.remove('hidden'); 
        content.classList.add('hidden');

        try {
            const url = `/api/stats/top_movies?user_id=${state.user}&category=${state.category}&period=${state.period}&sort_by=${state.sortBy}`;
            const res = await fetch(url);
            const json = await res.json();
            
            if(json.status === 'success' && json.data && json.data.length > 0) {
                const list = json.data;
                maxPlayCount = list[0].PlayCount || 1;

                const top3 = [];
                if(list[0]) top3.push({...list[0], rank: 1});
                if(list[1]) top3.push({...list[1], rank: 2});
                if(list[2]) top3.push({...list[2], rank: 3});
                const others = list.slice(3);

                renderPodium(top3);
                renderList(others);
                
                loading.classList.add('hidden'); 
                content.classList.remove('hidden');
            } else {
                loading.innerHTML = `<div class="py-10"><i class="fa-solid fa-ghost text-5xl text-gray-300 dark:text-gray-700 mb-4"></i><p class="text-sm font-bold text-gray-400">该维度下暂无播放记录</p></div>`;
            }
        } catch (e) { 
            console.error(e); 
            loading.innerText = "数据加载异常"; 
        }
    }

    function renderPodium(items) {
        const container = document.getElementById('podium-section');
        let html = '';
        
        items.forEach(item => {
            const imgUrl = `/api/proxy/smart_image?item_id=${item.ItemId}&name=${encodeURIComponent(item.ItemName)}&type=Primary`;
            
            const isFirst = item.rank === 1;
            let widthClass = isFirst ? 'w-[38%] md:w-60' : 'w-[28%] md:w-44';
            let heightClass = isFirst ? 'aspect-[2/3] md:h-80' : 'aspect-[2/3] md:h-64 opacity-95 hover:opacity-100'; 
            let borderClass = `rank-${item.rank}-border`;
            
            let crownHtml = isFirst ? '<i class="fa-solid fa-crown crown-icon"></i>' : '';
            let rankColors = {
                1: 'bg-gradient-to-r from-amber-400 to-amber-600 text-white shadow-md shadow-amber-500/40',
                2: 'bg-gradient-to-r from-slate-300 to-slate-400 text-slate-800 shadow-md',
                3: 'bg-gradient-to-r from-orange-500 to-orange-700 text-white shadow-md'
            };
            
            let orderClass = '';
            if (item.rank === 1) orderClass = 'order-2 z-20 -mx-1 md:-mx-3 mb-1 md:mb-3'; 
            if (item.rank === 2) orderClass = 'order-1 z-10';       
            if (item.rank === 3) orderClass = 'order-3 z-10';       

            // 🔥 新增：Top 3 补充播放时长
            html += `
            <div class="podium-card relative flex flex-col items-center group shrink-0 ${orderClass} ${widthClass} cursor-pointer">
                ${crownHtml}
                <div class="relative w-full rounded-2xl overflow-hidden ${borderClass} ${heightClass} bg-gray-200 dark:bg-gray-800 shadow-xl">
                    <img src="${imgUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700 ease-out" loading="lazy">
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/30 to-transparent opacity-90 group-hover:opacity-100 transition-opacity"></div>
                    
                    <div class="absolute bottom-0 left-0 right-0 p-3 md:p-5 text-center">
                        <div class="inline-block ${rankColors[item.rank]} text-[10px] md:text-xs font-black px-2 md:px-3 py-0.5 rounded-md mb-1.5 md:mb-2 tracking-wide">
                            TOP ${item.rank}
                        </div>
                        <h3 class="text-white font-bold text-xs md:text-base line-clamp-2 leading-tight drop-shadow-md mb-1">${item.ItemName}</h3>
                        
                        <div class="flex items-center justify-center gap-1.5 text-gray-300 text-[9px] md:text-[11px] font-mono opacity-90 mt-1.5">
                            <span class="flex items-center"><i class="fa-solid fa-play text-gray-400 mr-1 text-[8px]"></i>${item.PlayCount}</span>
                            <span class="text-white/20">|</span>
                            <span class="flex items-center"><i class="fa-regular fa-clock text-gray-400 mr-1 text-[9px]"></i>${Math.round(item.TotalTime/60)}m</span>
                        </div>
                    </div>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function renderList(items) {
        const container = document.getElementById('list-section');
        if(items.length === 0) { 
            container.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm md:col-span-2">无更多数据</div>'; 
            return; 
        }

        let html = '';
        items.forEach((item, index) => {
            const rank = index + 4;
            const imgUrl = `/api/proxy/smart_image?item_id=${item.ItemId}&name=${encodeURIComponent(item.ItemName)}&type=Primary`;
            const percent = Math.min((item.PlayCount / maxPlayCount) * 100, 100);

            // 🔥 Bento 卡片设计：悬浮质感、内置进度条、精美徽章
            html += `
            <div class="relative bg-white dark:bg-gray-800 rounded-2xl p-2.5 md:p-3 flex items-center gap-3 md:gap-4 border border-gray-100 dark:border-gray-700 shadow-sm hover:shadow-lg hover:-translate-y-0.5 hover:border-indigo-100 dark:hover:border-indigo-900/50 transition-all duration-300 overflow-hidden group cursor-default">
                
                <div class="absolute left-0 top-0 bottom-0 bg-indigo-50/60 dark:bg-indigo-900/20 z-0 transition-all duration-700" style="width: ${percent}%;"></div>
                
                <div class="relative z-10 w-7 md:w-10 text-center font-black text-xl md:text-2xl italic text-gray-300 dark:text-gray-600 group-hover:text-indigo-400 transition-colors">
                    ${rank}
                </div>
                
                <div class="relative z-10 w-11 h-16 md:w-14 md:h-20 rounded-xl overflow-hidden shadow-sm shrink-0 border border-gray-100 dark:border-gray-700 bg-gray-200 dark:bg-gray-800">
                    <img src="${imgUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" loading="lazy">
                </div>
                
                <div class="relative z-10 flex-1 min-w-0 pr-2">
                    <h4 class="text-sm md:text-base font-bold text-gray-800 dark:text-gray-100 truncate mb-1.5 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">${item.ItemName}</h4>
                    
                    <div class="flex items-center gap-2 md:gap-3 text-[10px] md:text-xs font-medium text-gray-600 dark:text-gray-400">
                        <span class="bg-gray-100 dark:bg-gray-900/80 px-2 py-1 rounded-md shadow-inner flex items-center gap-1 border border-gray-200/50 dark:border-gray-700/50">
                            <i class="fa-solid fa-fire text-orange-500 text-[10px]"></i> ${item.PlayCount} 次
                        </span>
                        <span class="bg-gray-100 dark:bg-gray-900/80 px-2 py-1 rounded-md shadow-inner flex items-center gap-1 border border-gray-200/50 dark:border-gray-700/50">
                            <i class="fa-regular fa-clock text-blue-500 text-[10px]"></i> ${Math.round(item.TotalTime/60)} 分钟
                        </span>
                    </div>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }

    init();
</script>
{% endblock %}
