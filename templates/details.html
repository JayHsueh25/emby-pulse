{% extends "layout.html" %}
{% block title %}数据洞察 - EmbyPulse{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto w-full px-4 md:px-8 py-6 pb-20">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-black text-gray-900 dark:text-white">数据洞察</h1>
            <p class="text-xs text-gray-500 mt-1">深度分析用户行为画像</p>
        </div>
        <div class="w-full md:w-auto bg-white dark:bg-gray-800 p-1 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 relative">
             <select id="user-select" onchange="changeUser()" class="w-full md:w-56 appearance-none bg-transparent text-gray-700 dark:text-gray-200 py-2.5 pl-4 pr-10 rounded-lg text-sm font-bold focus:outline-none cursor-pointer focus:ring-2 focus:ring-indigo-500 transition">
                <option value="all">🌏 全服数据</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500"><i class="fa-solid fa-chevron-down text-sm"></i></div>
        </div>
    </div>

    <div id="loading" class="text-center py-20 text-gray-400">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-500 mb-3"></i>
        <p class="text-sm font-bold tracking-widest animate-pulse">正在生成用户画像雷达...</p>
    </div>

    <div id="content-area" class="hidden animate-fade-in space-y-6">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm flex flex-col justify-center min-h-[220px]">
                <h3 class="font-bold text-gray-800 dark:text-gray-200 mb-4 text-sm flex items-center tracking-wide">
                    <i class="fa-solid fa-medal text-yellow-500 mr-2 text-lg"></i> 观影成就
                </h3>
                <div id="badges-container" class="flex flex-wrap gap-2"></div>
            </div>
            
            <div class="lg:col-span-2 bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-800 dark:text-gray-200 text-sm flex items-center tracking-wide">
                        <i class="fa-solid fa-chart-line text-blue-500 mr-2 text-lg"></i> 观影频率统计
                    </h3>
                    <div class="flex bg-gray-50 dark:bg-gray-900 rounded-lg p-1 text-[11px] border border-gray-100 dark:border-gray-700">
                        <button onclick="switchChart('day')" class="chart-btn px-3 py-1.5 rounded transition text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white font-bold" id="btn-day">月内</button>
                        <button onclick="switchChart('month')" class="chart-btn px-3 py-1.5 rounded bg-white dark:bg-gray-700 shadow-sm text-indigo-600 dark:text-indigo-400 font-bold transition" id="btn-month">年内</button>
                    </div>
                </div>
                <div class="relative h-48 w-full">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm">
                <h3 class="font-bold text-gray-800 dark:text-gray-200 text-sm mb-4 flex items-center tracking-wide"><i class="fa-regular fa-clock text-indigo-500 mr-2 text-lg"></i> 活跃时间段雷达</h3>
                <div class="relative h-64 w-full"><canvas id="hourChart"></canvas></div>
            </div>
            
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm">
                <h3 class="font-bold text-gray-800 dark:text-gray-200 text-sm mb-4 flex items-center tracking-wide"><i class="fa-solid fa-desktop text-purple-500 mr-2 text-lg"></i> 常用播放设备终端</h3>
                <div class="relative h-64 w-full"><canvas id="deviceChart"></canvas></div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/80">
                <h3 class="font-bold text-gray-800 dark:text-gray-200 text-sm flex items-center tracking-wide">
                    <i class="fa-solid fa-list-check text-green-500 mr-2 text-lg"></i> 100 条最新播放流水
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-gray-500 uppercase bg-gray-50 dark:bg-gray-700/50 dark:text-gray-400">
                        <tr>
                            <th class="px-6 py-3">时间</th>
                            <th class="px-6 py-3">用户</th>
                            <th class="px-6 py-3">媒体名称</th>
                            <th class="px-6 py-3">终端设备</th>
                            <th class="px-6 py-3 text-right">时长</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table-body" class="divide-y divide-gray-100 dark:divide-gray-700/50 text-gray-600 dark:text-gray-300">
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    let charts = { trend: null, hour: null, device: null };
    let currentChartDim = 'month';

    // 🔥 解析 URL 中的 uid 参数，用于接收从首页传过来的指令
    function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        return params.get('uid');
    }

    async function init() {
        await loadUsers();
        
        // 自动聚焦传过来的用户
        const targetUid = getUrlParams();
        if (targetUid) {
            const select = document.getElementById('user-select');
            for(let i=0; i<select.options.length; i++) {
                if(select.options[i].value === targetUid) {
                    select.selectedIndex = i;
                    break;
                }
            }
        }
        
        changeUser();
    }

    async function loadUsers() {
        try {
            const res = await fetch('/api/users');
            const json = await res.json();
            const select = document.getElementById('user-select');
            if(json.status === 'success') {
                json.data.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.UserId;
                    option.innerText = `👤 ${user.UserName}`;
                    select.appendChild(option);
                });
            }
        } catch (e) { console.error(e); }
    }

    async function changeUser() {
        const userId = document.getElementById('user-select').value;
        const loading = document.getElementById('loading');
        const content = document.getElementById('content-area');
        
        loading.classList.remove('hidden');
        content.classList.add('hidden');

        try {
            await fetchUserDetails(userId);
            await fetchBadges(userId);
            await initTrendChart(userId, currentChartDim);
            
            loading.classList.add('hidden');
            content.classList.remove('hidden');
        } catch (e) { console.error(e); }
    }

    function switchChart(dim) {
        currentChartDim = dim;
        ['day', 'month'].forEach(d => {
            const btn = document.getElementById(`btn-${d}`);
            if(d === dim) {
                btn.className = "chart-btn px-3 py-1.5 rounded bg-white dark:bg-gray-700 shadow-sm text-indigo-600 dark:text-indigo-400 font-bold transition";
            } else {
                btn.className = "chart-btn px-3 py-1.5 rounded transition text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white font-bold";
            }
        });
        const userId = document.getElementById('user-select').value;
        initTrendChart(userId, dim);
    }

    async function initTrendChart(userId, dimension = 'month') {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if(charts.trend) charts.trend.destroy();
        
        const isDark = document.documentElement.classList.contains('dark');
        const gridColor = isDark ? '#374151' : '#f3f4f6';
        
        try {
            const endpoint = dimension === 'month' ? '/api/stats/monthly_stats' : '/api/stats/trend?dimension=day';
            const url = `${endpoint}${endpoint.includes('?')?'&':'?'}user_id=${userId}`;
            const res = await fetch(url);
            const json = await res.json();
            const data = json.data || {};
            const labels = Object.keys(data);
            const values = Object.values(data).map(v => Math.round(v/3600));

            // Vercel 极简柱状图风格
            charts.trend = new Chart(ctx, {
                type: 'bar',
                data: { 
                    labels: labels.length > 0 ? labels : ['无'], 
                    datasets: [{ 
                        data: values.length > 0 ? values : [0], 
                        backgroundColor: isDark ? '#6366f1' : '#4f46e5', 
                        borderRadius: 4,
                        barPercentage: 0.6
                    }] 
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: gridColor }, border:{display:false} }, 
                        x: { grid: { display: false }, ticks: { font: {family: 'monospace'}, maxRotation: 0 } } 
                    } 
                }
            });
        } catch(e) {}
    }

    async function fetchBadges(userId) {
        const container = document.getElementById('badges-container');
        try {
            const res = await fetch(`/api/stats/badges?user_id=${userId}`);
            const json = await res.json();
            if (json.status === 'success' && json.data.length > 0) {
                let html = '';
                json.data.forEach(b => {
                    html += `<div class="${b.bg} ${b.color} dark:bg-opacity-20 px-3 py-1.5 rounded-lg flex items-center text-sm font-bold shadow-sm cursor-help transition hover:-translate-y-0.5" title="${b.desc}"><i class="fa-solid ${b.icon} mr-2"></i>${b.name}</div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<span class="text-gray-400 text-sm italic">数据积攒中，暂无特殊成就</span>';
            }
        } catch(e){}
    }

    async function fetchUserDetails(userId) {
        try {
            const res = await fetch(`/api/stats/user_details?user_id=${userId}`);
            const json = await res.json();
            if (json.status === 'success') {
                renderHourChart(json.data.hourly);
                renderDeviceChart(json.data.devices);
                renderLogs(json.data.logs);
            }
        } catch(e){}
    }

    function renderHourChart(dataObj) {
        const ctx = document.getElementById('hourChart').getContext('2d');
        if(charts.hour) charts.hour.destroy();
        
        let labels = [], values = [];
        for(let i=0; i<24; i++) {
            let h = String(i).padStart(2, '0');
            labels.push(h+':00');
            values.push(dataObj[h] || 0);
        }
        
        const isDark = document.documentElement.classList.contains('dark');
        const gridColor = isDark ? '#374151' : '#e5e7eb';

        charts.hour = new Chart(ctx, {
            type: 'radar',
            data: { 
                labels: labels, 
                datasets: [{ 
                    data: values, 
                    backgroundColor: isDark ? 'rgba(99, 102, 241, 0.4)' : 'rgba(99, 102, 241, 0.2)', 
                    borderColor: '#6366f1', 
                    borderWidth: 2,
                    pointBackgroundColor: '#6366f1',
                    pointRadius: 2
                }] 
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                scales: { 
                    r: { 
                        angleLines: { color: gridColor }, 
                        grid: { color: gridColor }, 
                        pointLabels: { font: {size: 10, family: 'monospace'}, color: isDark ? '#9ca3af' : '#6b7280' }, 
                        ticks: { display: false } 
                    } 
                }, 
                plugins: { legend: { display: false } } 
            }
        });
    }

    function renderDeviceChart(dataList) {
        const ctx = document.getElementById('deviceChart').getContext('2d');
        if(charts.device) charts.device.destroy();
        
        if(!dataList || dataList.length === 0) return;

        let labels = [], values = [], others = 0;
        dataList.forEach((d, i) => { if(i < 5) { labels.push(d.Device); values.push(d.Plays); } else { others += d.Plays; } });
        if(others > 0) { labels.push('其他'); values.push(others); }
        
        const isDark = document.documentElement.classList.contains('dark');
        const borderColor = isDark ? '#1f2937' : '#fff';

        charts.device = new Chart(ctx, {
            type: 'doughnut',
            data: { 
                labels: labels, 
                datasets: [{ 
                    data: values, 
                    backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#cbd5e1'], 
                    borderWidth: 3, 
                    borderColor: borderColor,
                    hoverOffset: 4
                }] 
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                cutout: '70%',
                plugins: { 
                    legend: { position: 'right', labels: {boxWidth: 12, usePointStyle: true, font:{weight: 'bold'}, color: isDark ? '#d1d5db' : '#374151'} } 
                } 
            }
        });
    }

    function renderLogs(logs) {
        const tbody = document.getElementById('logs-table-body');
        if (!logs || logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-gray-400">暂无播放记录 ☕</td></tr>';
            return;
        }

        let html = '';
        logs.forEach(log => {
            let dateStr = log.DateCreated;
            if (dateStr && dateStr.includes(' ')) dateStr = dateStr.replace(' ', 'T');
            const date = new Date(dateStr).toLocaleString('zh-CN', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
            
            let deviceIcon = 'fa-mobile-screen';
            const d = (log.Device || '').toLowerCase();
            if(d.includes('browser') || d.includes('chrome')) deviceIcon = 'fa-globe';
            else if(d.includes('tv')) deviceIcon = 'fa-tv';
            else if(d.includes('apple') || d.includes('mac') || d.includes('ios')) deviceIcon = 'fa-apple';
            
            html += `<tr class="bg-white dark:bg-gray-800 border-b border-gray-50 dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition">
                <td class="px-6 py-3.5 font-mono text-[11px] text-gray-500 whitespace-nowrap">${date}</td>
                <td class="px-6 py-3.5 font-bold text-gray-700 dark:text-gray-300">${log.UserName}</td>
                <td class="px-6 py-3.5 font-bold text-gray-900 dark:text-gray-100 max-w-[200px] truncate" title="${log.ItemName}">${log.ItemName}</td>
                <td class="px-6 py-3.5 text-[11px]">
                    <span class="bg-gray-100 dark:bg-gray-700/50 text-gray-600 dark:text-gray-400 px-2 py-1 rounded font-mono border border-gray-200/50 dark:border-gray-600/50 flex items-center w-fit gap-1.5">
                        <i class="fa-solid ${deviceIcon}"></i> <span class="truncate max-w-[100px]">${log.Device}</span>
                    </span>
                </td>
                <td class="px-6 py-3.5 text-right font-mono font-bold text-indigo-600 dark:text-indigo-400">${Math.round(log.PlayDuration/60)}m</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }
    
    init();
</script>
{% endblock %}
